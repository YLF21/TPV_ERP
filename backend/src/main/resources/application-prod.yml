spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${TPV_DB_URL}
    username: ${TPV_DB_USERNAME}
    password: ${TPV_DB_PASSWORD}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    com.tpverp.backend: INFO

tpv:
  verifactu:
    secret-directory: '${TPV_VERIFACTU_SECRET_DIRECTORY:C:\ProgramData\TPV ERP\secrets\verifactu}'
    secret-acl-mode: ${TPV_VERIFACTU_SECRET_ACL_MODE:STRICT}
    secret-service-account: '${TPV_VERIFACTU_SERVICE_ACCOUNT:NT SERVICE\TPVERPBackend}'
