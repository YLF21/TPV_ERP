spring:
  application:
    name: TPV ERP Backend
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    default: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mvc:
    problemdetails:
      enabled: true

server:
  address: ${TPV_SERVER_ADDRESS:0.0.0.0}
  port: ${TPV_SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

tpv:
  installation:
    key-directory: ${TPV_KEY_DIRECTORY:${user.home}/.tpv-erp/keys}
  license:
    issuer-public-key-file: ${TPV_LICENSE_ISSUER_PUBLIC_KEY_FILE:}
  backup:
    default-directory: ${TPV_BACKUP_DIRECTORY:${user.home}/TPV-ERP-Backups}
    pg-dump-command: ${TPV_PG_DUMP_COMMAND:pg_dump}
    pg-restore-command: ${TPV_PG_RESTORE_COMMAND:pg_restore}
  product-images:
    directory: ${TPV_PRODUCT_IMAGE_DIRECTORY:${user.home}/.tpv-erp/product-images}
  verifactu:
    endpoint-mode: ${TPV_VERIFACTU_ENDPOINT_MODE:TEST}
    certificate-path: ${TPV_VERIFACTU_CERTIFICATE_PATH:}
    certificate-password: ${TPV_VERIFACTU_CERTIFICATE_PASSWORD:}
    system-name: ${TPV_VERIFACTU_SYSTEM_NAME:TPV ERP}
    system-id: ${TPV_VERIFACTU_SYSTEM_ID:01}
    worker-enabled: ${TPV_VERIFACTU_WORKER_ENABLED:true}
    worker-delay-ms: ${TPV_VERIFACTU_WORKER_DELAY_MS:3600000}
